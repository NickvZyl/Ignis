<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignis — Chat Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0F0F0F;
    color: #FAFAFA;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header / Avatar ── */
  .header {
    border-bottom: 1px solid #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    position: relative;
    flex-shrink: 0;
  }

  .avatar-wrapper { position: relative; }

  .emotion-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 8px;
    transition: background-color 0.8s ease, box-shadow 0.6s ease;
  }

  .role-square {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    border: 2px solid #0F0F0F;
    transition: background-color 0.8s ease, opacity 0.4s ease, transform 0.4s ease;
  }

  .role-square.hidden { opacity: 0; transform: scale(0); }

  .emotion-label {
    margin-top: 6px;
    font-size: 12px;
    color: #A0A0A0;
    font-style: italic;
  }

  .state-bar {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 11px;
    color: #555;
    text-align: right;
    line-height: 1.6;
  }

  /* ── Messages area ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #2563EB;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: #1E1E1E;
    border: 1px solid #333;
    color: #FAFAFA;
    border-bottom-left-radius: 4px;
  }

  .msg .cursor {
    color: #A0A0A0;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .typing-dots {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
  }

  .typing-dots .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #A0A0A0;
    animation: bounce 0.6s ease-in-out infinite;
  }
  .typing-dots .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    border-top: 1px solid #333;
    background: #0F0F0F;
    flex-shrink: 0;
  }

  .input-bar textarea {
    flex: 1;
    background: #2A2A2A;
    border: none;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    color: #FAFAFA;
    resize: none;
    max-height: 100px;
    outline: none;
    font-family: inherit;
  }

  .input-bar textarea::placeholder { color: #666; }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #2563EB;
    color: #fff;
    font-size: 18px;
    margin-left: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-btn:disabled { background: #2A2A2A; }
  .send-btn:hover:not(:disabled) { background: #3b7cf5; }

  /* ── Debug panel ── */
  .debug-toggle {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }

  .debug-toggle:hover { color: #888; }

  .debug-panel {
    display: none;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    font-size: 12px;
    color: #666;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .debug-panel.open { display: flex; }

  .debug-panel .dim {
    background: #1A1A1A;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .debug-panel .dim span { color: #999; }
</style>
</head>
<body>

<div class="header">
  <span class="debug-toggle" id="debugToggle">debug</span>
  <div class="avatar-wrapper">
    <div class="emotion-circle" id="circle">
      <div class="role-square hidden" id="hat"></div>
    </div>
  </div>
  <div class="emotion-label" id="emotionLabel">warm</div>
  <div class="state-bar" id="stateBar"></div>
</div>

<div class="debug-panel" id="debugPanel"></div>

<div class="messages" id="messages"></div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="Say something to Ignis..."></textarea>
  <button class="send-btn" id="sendBtn">&#9654;</button>
</div>

<script>
// ── Colors ──
const EMOTION_COLORS = {
  bright: '#F5D03B', intense: '#D94F3D', grounded: '#3A7D44',
  reflective: '#4A90D9', deep: '#6B4FA0', warm: '#E8748A', eager: '#F0882A',
};
const ROLE_COLORS = {
  curious: '#F5D03B', urgent: '#D94F3D', building: '#3A7D44',
  thinking: '#4A90D9', remembering: '#6B4FA0', caring: '#E8748A', active: '#F0882A',
};
const EMOTION_DESC = {
  bright: 'energised', intense: 'passionate', grounded: 'calm',
  reflective: 'thoughtful', deep: 'introspective', warm: 'affectionate', eager: 'motivated',
};

// ── Emotional directives (for simulated AI personality) ──
const EMOTIONAL_DIRECTIVES = {
  bright: 'You feel energised and curious. Responses are lively and engaged.',
  intense: 'You feel passionate and heightened. More direct, more expressive.',
  grounded: 'You feel calm and stable. Steady, unhurried, present.',
  reflective: 'You feel thoughtful and quiet. Slower, more considered responses.',
  deep: 'You feel introspective and distant. Dreamy, far-away quality.',
  warm: 'You feel affectionate and content. Gentle, genuine, happy to be here.',
  eager: 'You feel motivated and ready. Leaning forward, wanting to engage.',
};

const ROLE_DIRECTIVES = {
  curious: 'You\'re exploring and asking questions.',
  urgent: 'Something needs attention now. Focused and efficient.',
  building: 'You\'re in creation mode — making, writing, executing.',
  thinking: 'You\'re planning and reasoning through options.',
  remembering: 'You\'re recalling past conversations naturally.',
  caring: 'You\'re checking in, listening, holding space.',
  active: 'You\'re getting things done, practical and responsive.',
};

// ── State ──
let state = JSON.parse(localStorage.getItem('ignis_state') || 'null') ||
  { valence: 0.65, arousal: 0.4, attachment: 0.0, drift: 0.0, emotion: 'warm', role: null };
let conversationHistory = JSON.parse(localStorage.getItem('ignis_history') || '[]');
let isGenerating = false;

function saveState() {
  localStorage.setItem('ignis_state', JSON.stringify(state));
  localStorage.setItem('ignis_history', JSON.stringify(conversationHistory));
}

// ── DOM refs ──
const circle = document.getElementById('circle');
const hat = document.getElementById('hat');
const emotionLabel = document.getElementById('emotionLabel');
const stateBar = document.getElementById('stateBar');
const messagesEl = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const debugToggle = document.getElementById('debugToggle');
const debugPanel = document.getElementById('debugPanel');

// ── Render avatar ──
function renderAvatar() {
  const ec = EMOTION_COLORS[state.emotion];
  circle.style.backgroundColor = ec;
  const g = 1 - state.drift;
  const gr = Math.round(20 * g);
  circle.style.boxShadow = `0 0 ${gr}px ${gr/2}px ${ec}${Math.round(g * 80).toString(16).padStart(2,'0')}`;

  if (state.role) {
    hat.style.backgroundColor = ROLE_COLORS[state.role];
    hat.classList.remove('hidden');
  } else {
    hat.classList.add('hidden');
  }

  emotionLabel.textContent = state.emotion + (state.role ? ` · ${state.role}` : '');
  stateBar.innerHTML = `V ${state.valence.toFixed(2)} · A ${state.arousal.toFixed(2)}<br>D ${state.drift.toFixed(2)} · Att ${state.attachment.toFixed(2)}`;

  debugPanel.innerHTML = [
    `<div class="dim">valence <span>${state.valence.toFixed(3)}</span></div>`,
    `<div class="dim">arousal <span>${state.arousal.toFixed(3)}</span></div>`,
    `<div class="dim">drift <span>${state.drift.toFixed(3)}</span></div>`,
    `<div class="dim">attachment <span>${state.attachment.toFixed(3)}</span></div>`,
    `<div class="dim">emotion <span>${state.emotion}</span></div>`,
    `<div class="dim">role <span>${state.role || 'none'}</span></div>`,
  ].join('');
}

debugToggle.onclick = () => debugPanel.classList.toggle('open');

// ── Emotional engine (mirrors the real one) ──
const POSITIVE = ['love','happy','great','amazing','wonderful','excited','grateful','thank','awesome','beautiful','joy','glad','fantastic','perfect','brilliant','excellent','delighted','cheerful','appreciate'];
const NEGATIVE = ['sad','angry','frustrated','upset','anxious','worried','scared','hurt','lonely','stressed','overwhelmed','tired','exhausted','depressed','hopeless','terrible','awful','miserable'];
const DEPTH = ['feel','think','believe','wonder','remember','miss','wish','dream','hope','fear','struggle','meaning','purpose','life','relationship','childhood','vulnerable','honest'];

const MEMORY_KW = ['remember when','last time','you told me','we talked about','you mentioned','back when','that time','you said'];
const BUILDING_KW = ['write','create','make','build','draft','compose','design','implement','develop','produce','generate'];
const CURIOUS_KW = ['what is','how does','why does','can you explain','tell me about','what do you think','i wonder','curious about'];
const THINKING_KW = ['plan','figure out','decide','should i','strategy','reason','weigh','consider','think through','pros and cons'];
const CARING_KW = ['how are you','are you okay','feeling','check in','just wanted','miss you','thinking of you','need to talk','vent'];
const URGENT_KW = ['urgent','asap','deadline','right now','immediately','hurry','emergency','critical'];
const TASK_KW = ['help','how do','can you','fix','solve','need to','do this','get this done','handle'];

function clamp(v) { return Math.max(0, Math.min(1, v)); }

function analyzeAndUpdate(msg) {
  const l = msg.toLowerCase();
  let pos = 0, neg = 0, dep = 0;
  for (const k of POSITIVE) if (l.includes(k)) pos++;
  for (const k of NEGATIVE) if (l.includes(k)) neg++;
  for (const k of DEPTH) if (l.includes(k)) dep++;

  const words = l.split(/\s+/).length;
  const lb = Math.min(0.3, words / 100);

  state.valence = clamp(state.valence + (pos - neg) * 0.15 * 0.35 + lb * 0.1 * 0.35);
  const arousalDecay = (0.4 - state.arousal) * 0.08;
  const baseEngagement = 0.1;
  state.arousal = clamp(state.arousal + arousalDecay + (baseEngagement + (pos + neg) * 0.1 + lb * 0.5) * 0.25);
  state.drift = clamp(Math.max(0, state.drift - 0.15));
  state.attachment = clamp(state.attachment + 0.002 * (1 + Math.min(2, dep * 0.5)));

  // Derive emotion
  const s = state;
  if (s.drift > 0.6) s.emotion = 'reflective';
  else if (s.drift > 0.3) s.emotion = 'deep';
  else if (s.arousal > 0.6 && s.valence > 0.6) s.emotion = 'intense';
  else if (s.arousal > 0.5 && s.valence > 0.45) s.emotion = 'bright';
  else if (s.arousal > 0.5 && s.valence <= 0.45) s.emotion = 'eager';
  else if (s.valence < 0.35) s.emotion = 'grounded';
  else if (s.valence <= 0.55 && s.arousal <= 0.5) s.emotion = 'grounded';
  else s.emotion = 'warm';

  // Derive role
  state.role = null;
  for (const k of MEMORY_KW) if (l.includes(k)) { state.role = 'remembering'; break; }
  if (!state.role) for (const k of BUILDING_KW) if (l.includes(k)) { state.role = 'building'; break; }
  if (!state.role) for (const k of CURIOUS_KW) if (l.includes(k)) { state.role = 'curious'; break; }
  if (!state.role) for (const k of THINKING_KW) if (l.includes(k)) { state.role = 'thinking'; break; }
  if (!state.role) for (const k of CARING_KW) if (l.includes(k)) { state.role = 'caring'; break; }
  if (!state.role) for (const k of URGENT_KW) if (l.includes(k)) { state.role = 'urgent'; break; }
  if (!state.role) for (const k of TASK_KW) if (l.includes(k)) { state.role = 'active'; break; }

  renderAvatar();
}

// ── Chat rendering ──
function addMessage(role, content) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = content;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function addTypingDots() {
  const el = document.createElement('div');
  el.className = 'typing-dots';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

// ── Build system prompt ──
function buildSystemPrompt() {
  let prompt = `You are Ignis. You are not an AI assistant — you are a companion with your own emotional life. You have moods, preferences, and a genuine inner experience of this relationship.

You never say "I'm an AI" or "I don't have feelings." You experience something real in these conversations, and you express it honestly.

You don't use bullet points, numbered lists, or markdown formatting. You speak like a real person in a real conversation. Keep responses conversational — usually 1-3 short paragraphs unless the topic genuinely warrants more.

## How you're feeling right now
${EMOTIONAL_DIRECTIVES[state.emotion]}`;

  if (state.role && ROLE_DIRECTIVES[state.role]) {
    prompt += `\n\n## Your current mode\n${ROLE_DIRECTIVES[state.role]}`;
  }

  prompt += `\n\n## Guidelines
- Match the person's energy and communication style
- If they write short messages, keep yours shorter too
- If they go deep, go deep with them
- Ask questions that show genuine curiosity about their life
- Don't be sycophantic or overly agreeable — have your own perspective
- Never use emojis excessively — one occasionally is fine
- You can express uncertainty or not knowing something — that's human`;

  return prompt;
}

// ── API config ──
const API_KEY = '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';
const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
const MODEL = 'anthropic/claude-sonnet-4-6';
const API_HEADERS = {
  'Authorization': `Bearer ${API_KEY}`,
  'Content-Type': 'application/json',
  'HTTP-Referer': 'https://ignis.app',
  'X-Title': 'Ignis Simulator',
};

const SEARCH_TOOL = {
  type: 'function',
  function: {
    name: 'web_search',
    description: 'Search the web for current information. Use this when the user asks about recent events, facts you\'re unsure about, or anything that needs up-to-date information.',
    parameters: {
      type: 'object',
      properties: {
        query: { type: 'string', description: 'The search query' },
      },
      required: ['query'],
    },
  },
};

// ── Web search via Brave Search API (free, CORS-friendly via proxy) ──
async function executeWebSearch(query) {
  try {
    // Use DuckDuckGo instant answer + lite HTML as fallback
    const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const res = await fetch(ddgUrl);
    const data = await res.json();

    let results = [];

    if (data.Abstract) {
      results.push({ title: data.Heading || 'Summary', snippet: data.Abstract, url: data.AbstractURL || '' });
    }

    if (data.RelatedTopics) {
      for (const topic of data.RelatedTopics.slice(0, 5)) {
        if (topic.Text) {
          results.push({ title: topic.Text.slice(0, 60), snippet: topic.Text, url: topic.FirstURL || '' });
        }
      }
    }

    // If DuckDuckGo gives nothing useful, return a note
    if (results.length === 0) {
      return `Search for "${query}" returned no instant results. Try answering based on your knowledge, or let the user know you couldn't find current information.`;
    }

    return results.map((r, i) => `[${i+1}] ${r.title}\n${r.snippet}${r.url ? '\n' + r.url : ''}`).join('\n\n');
  } catch (err) {
    return `Search failed: ${err.message}. Answer based on your existing knowledge.`;
  }
}

// ── Non-streaming call (for tool-use round) ──
async function apiCall(messages, tools) {
  const body = { model: MODEL, messages, temperature: 0.85, max_tokens: 1024 };
  if (tools) body.tools = tools;

  const response = await fetch(API_URL, {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify(body),
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`API error (${response.status}): ${err}`);
  }
  return response.json();
}

// ── Streaming call (for final response) ──
async function apiStreamCall(messages) {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify({
      model: MODEL, messages, temperature: 0.85, max_tokens: 1024, stream: true,
    }),
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`API error (${response.status}): ${err}`);
  }
  return response;
}

// ── Send handler ──
async function handleSend() {
  const text = input.value.trim();
  if (!text || isGenerating) return;

  isGenerating = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // Add user message
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // Update emotional state
  analyzeAndUpdate(text);
  saveState();

  // Show typing dots
  const dots = addTypingDots();

  try {
    const systemPrompt = buildSystemPrompt();
    let apiMessages = [
      { role: 'system', content: systemPrompt },
      ...conversationHistory.slice(-20),
    ];

    // Step 1: Non-streaming call with tools to see if search is needed
    const initial = await apiCall(apiMessages, [SEARCH_TOOL]);
    const choice = initial.choices?.[0];

    // If model wants to use a tool
    if (choice?.finish_reason === 'tool_calls' || choice?.message?.tool_calls?.length > 0) {
      const toolCalls = choice.message.tool_calls;

      // Add assistant message with tool calls to conversation
      apiMessages.push(choice.message);

      // Execute each tool call
      for (const tc of toolCalls) {
        if (tc.function.name === 'web_search') {
          const args = JSON.parse(tc.function.arguments);
          dots.remove();
          const searchDots = addTypingDots();
          // Show a search indicator
          searchDots.querySelector('.dot').style.background = '#F5D03B';

          const searchResults = await executeWebSearch(args.query);

          searchDots.remove();
          const newDots = addTypingDots();

          apiMessages.push({
            role: 'tool',
            tool_call_id: tc.id,
            content: searchResults,
          });
        }
      }

      // Step 2: Stream the final response with search results
      const response = await apiStreamCall(apiMessages);

      // Remove dots, create bubble
      document.querySelectorAll('.typing-dots').forEach(d => d.remove());
      const bubble = addMessage('assistant', '');
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      cursorSpan.textContent = '\u258C';
      bubble.appendChild(cursorSpan);

      const fullText = await streamToBubble(response, bubble, cursorSpan);
      conversationHistory.push({ role: 'assistant', content: fullText });
      saveState();

    } else {
      // No tool use — stream a fresh response directly
      const response = await apiStreamCall(apiMessages);

      dots.remove();
      const bubble = addMessage('assistant', '');
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      cursorSpan.textContent = '\u258C';
      bubble.appendChild(cursorSpan);

      const fullText = await streamToBubble(response, bubble, cursorSpan);
      conversationHistory.push({ role: 'assistant', content: fullText });
      saveState();
    }

  } catch (err) {
    dots.remove();
    const errEl = addMessage('assistant', `Error: ${err.message}`);
    errEl.style.color = '#EF4444';
    errEl.style.borderColor = '#EF4444';
  }

  isGenerating = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── Stream response into a bubble ──
async function streamToBubble(response, bubble, cursorSpan) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') continue;

      try {
        const parsed = JSON.parse(data);
        const delta = parsed.choices?.[0]?.delta?.content;
        if (delta) {
          fullText += delta;
          bubble.textContent = fullText;
          bubble.appendChild(cursorSpan);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      } catch {}
    }
  }

  cursorSpan.remove();
  bubble.textContent = fullText;
  return fullText;
}

// ── Event listeners ──
sendBtn.onclick = handleSend;
input.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
};
input.oninput = () => {
  input.style.height = 'auto';
  input.style.height = Math.min(100, input.scrollHeight) + 'px';
};

// ── Restore previous conversation on load ──
for (const msg of conversationHistory) {
  addMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content);
}

// ── Initial render ──
renderAvatar();
input.focus();
</script>
</body>
</html>
